    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2a;
            --header-bg: #0b0f1a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d3748;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            padding: 20px;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .type-toggle {
            display: flex;
            gap: 10px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .genre-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            padding: 5px;
        }

        /* Generic tag style - Colors applied via JS */
        .tag {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid transparent;
            white-space: nowrap;
            opacity: 0.6;
            transition: 0.2s;
        }

        .tag.active {
            opacity: 1;
            transform: scale(1.05);
            border: 1px solid white;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        .stats {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 30px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .card-type {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .card h3 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #fff;
        }

        .card p {
            font-size: 0.9rem;
            color: var(--text-dim);
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .pill {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        #clear-filters {
            background: none;
            border: 1px solid #ef4444;
            color: #ef4444;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>

    function getContrastColor(hex) {
        if (!hex || hex === 'transparent') return 'white';
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        return brightness > 125 ? 'black' : 'white';
    }

        { t: "Sons of the Cherry", d: "Revolution espionage arcane magic secret war soul.", c: ["Alternative History", "Magic", "Spy"], type: "hosted" },
        { t: "Apex Patrol", d: "Star cruiser commander rescue investigation save Earth.", c: ["Space opera", "Sci-Fi", "War"], type: "hosted" },
        { t: "Wizard’s Choice", d: "D&D style spells evil smite fortune glory.", c: ["High/Epic Fantasy", "Magic", "Adventure"], type: "hosted" },
        { t: "The Race", d: "Peru race journey lifetime teams performance choices.", c: ["Adventure", "Personal transformation", "Modern"], type: "hosted" },
        { t: "Dead Already?", d: "Short murder mystery randomly selected murderer challenge.", c: ["Mystery", "Crime", "Modern"], type: "hosted" },
        { t: "Mobile Armored Marine", d: "Imperial Armor Marine stealth diplomacy armor power.", c: ["Sci-Fi", "War", "Action"], type: "hosted" },
        { t: "Zebulon", d: "Asteroid Zebulon secrets space pet goldfish Henry.", c: ["Sci-Fi", "Space opera", "Comedy"], type: "hosted" },
        { t: "Zombie Exodus", d: "Daring escape zombie city swarm locusts ending.", c: ["Zombies", "Survival", "Post apocalyptic"], type: "hosted" },
        { t: "Dilemma", d: "Moral decisions modern drama Alex day juggle.", c: ["Modern", "Philosophical", "Drama"], type: "hosted" },
        { t: "Marine Raider", d: "WW2 elite Marine Raider platoon battle-plan landing.", c: ["War", "Historical", "Military"], type: "hosted" },
        { t: "Imprisoned", d: "Prison escape wits skills magnificent strength hard.", c: ["High/Epic Fantasy", "Adventure", "Mystery"], type: "hosted" },
        { t: "Land of Three Classes", d: "Retro multiple choice adventurer dungeon riddles apprentice.", c: ["High/Epic Fantasy", "Adventure", "Magic"], type: "hosted" },
        { t: "Paranoia", d: "Doctor trying kill you survival multiple choice.", c: ["Psychological", "Thriller", "Modern"], type: "hosted" },
        { t: "What Happened Last Night?", d: "Dark humorous action murder mystery text-based choice.", c: ["Mystery", "Comedy", "Thriller"], type: "hosted" },
        { t: "The Nightmare Maze", d: "Bostonian 19th century nightmares psyche tormented psyche haunt.", c: ["Goth", "Psychological", "Dreams"], type: "hosted" },
        { t: "Popcorn, Soda … Murder?", d: "Murder mystery find clues movie theater thriller.", c: ["Mystery", "Crime", "Modern"], type: "hosted" }
    ];

    const allTitles = [...data, ...hostedData];
    let activeGenres = new Set();
    let currentType = 'all';

    const genreBox = document.getElementById('genre-box');
    const grid = document.getElementById('grid');
    const counter = document.getElementById('counter');

    function init() {
        const uniqueGenres = [...new Set(allTitles.flatMap(t => t.c))].sort();
        uniqueGenres.forEach(genre => {
            const tag = document.createElement('div');
            tag.className = 'tag';
            tag.textContent = genre;
            const bg = colorMap[genre] || '#334155';
            tag.style.backgroundColor = bg;
            tag.style.color = getContrastColor(bg);
            tag.onclick = () => toggleGenre(genre, tag);
            genreBox.appendChild(tag);
        });
        render();
    }

    function setType(type, btn) {
        currentType = type;
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function toggleGenre(genre, el) {
        if (activeGenres.has(genre)) {
            activeGenres.delete(genre);
            el.classList.remove('active');
        } else {
            activeGenres.add(genre);
            el.classList.add('active');
        }
        render();
    }

    function clearAll() {
        activeGenres.clear();
        currentType = 'all';
        document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.toggle-btn').classList.add('active'); // Set first one
        render();
    }

    function render() {
        grid.innerHTML = '';
        const filtered = allTitles.filter(item => {
            const typeMatch = currentType === 'all' || item.type === currentType;
            const genreMatch = activeGenres.size === 0 || [...activeGenres].every(g => item.c.includes(g));
            return typeMatch && genreMatch;
        });

        counter.innerHTML = `Showing <b>${filtered.length}</b> of ${allTitles.length} titles`;

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            const typeLabel = item.type === 'choice' ? 'Choice of Games' : 'Hosted Games';
            
            const tags = item.c.map(genre => {
                const bg = colorMap[genre] || '#334155';
                const text = getContrastColor(bg);
                return `<span class="pill" style="background:${bg}; color:${text}">${genre}</span>`;
            }).join('');

            card.innerHTML = `
                <div class="card-type">${typeLabel}</div>
                <h3>${item.t}</h3>
                <p>${item.d}</p>
                <div class="card-tags">${tags}</div>
            `;
            grid.appendChild(card);
        });
    }

    init();
</script>
