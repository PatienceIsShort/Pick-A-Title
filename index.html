    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2a;
            --header-bg: #0b0f1a;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: #2d3748;
            --accent: #38bdf8;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            padding: 16px 20px;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .top-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .type-toggle {
            display: flex;
            gap: 8px;
        }

        .toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 7px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        /* ── Search ── */
        #search {
            flex: 1;
            min-width: 180px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        #search::placeholder { color: var(--text-dim); }
        #search:focus { border-color: var(--accent); }

        /* ── Genre filter pills ── */
        .genre-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 115px;
            overflow-y: auto;
            padding: 4px 2px;
        }

        .tag {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            cursor: pointer;
            border: 1px solid transparent;
            white-space: nowrap;
            opacity: 0.6;
            transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
            user-select: none;
        }
        .tag:hover  { opacity: 0.85; }
        .tag:focus  { outline: 2px solid var(--accent); outline-offset: 2px; }
        .tag.active {
            opacity: 1;
            transform: scale(1.05);
            border-color: rgba(255,255,255,0.8);
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        /* ── Stats row ── */
        .stats {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #clear-filters {
            background: none;
            border: 1px solid #ef4444;
            color: #ef4444;
            font-size: 0.72rem;
            padding: 3px 9px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        #clear-filters:hover {
            background: #ef4444;
            color: #fff;
        }

        /* ── Cards ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 28px 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Card link wrapper — removes default anchor styling */
        a.card-link {
            text-decoration: none;
            color: inherit;
            display: block;
            border-radius: 12px;
        }
        a.card-link:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.25s, border-color 0.25s;
            cursor: pointer;
            height: 100%;
        }
        a.card-link:hover .card {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .card-type {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .card h3 {
            margin: 0 0 8px;
            font-size: 1.1rem;
            color: #fff;
        }

        .card p {
            font-size: 0.875rem;
            color: var(--text-dim);
            flex-grow: 1;
            margin: 0 0 16px;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .pill {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
            font-size: 1rem;
        }
    </style>
</head>

/* ── Memoized contrast helper ── */
const _contrastCache = new Map();
function getContrastColor(hex) {
    if (_contrastCache.has(hex)) return _contrastCache.get(hex);
    if (!hex || hex === 'transparent') return 'white';
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    const result = (r * 299 + g * 587 + b * 114) / 1000 > 125 ? 'black' : 'white';
    _contrastCache.set(hex, result);
    return result;
}

/* ── URL slug generator ── */
function makeSlug(title) {
    return title
        .toLowerCase()
        // drop everything after a colon (subtitles), e.g. "Heroes of Tomorrow: Hidden Potential" → "Heroes of Tomorrow"
        .replace(/:.*$/, '')
        // remove apostrophes/special chars
        .replace(/[''`]/g, '')
        // replace any non-alphanumeric run with a hyphen
        .replace(/[^a-z0-9]+/g, '-')
        // trim leading/trailing hyphens
        .replace(/^-+|-+$/g, '');
}

function makeURL(item) {
    const base = 'https://www.choiceofgames.com';
    return `${base}/${makeSlug(item.t)}`;
}

/* ── Stamp type into each item ── */
const allTitles = [
    ...choiceData.map(d => ({ ...d, type: 'choice' })),
    ...hostedData.map(d => ({ ...d, type: 'hosted' }))
];

/* ── Pre-build pill HTML strings (done once, not on every render) ── */
const pillCache = new Map();
function getPillsHTML(genres) {
    const key = genres.join('|');
    if (pillCache.has(key)) return pillCache.get(key);
    const html = genres.map(g => {
        const bg = colorMap[g] || '#334155';
        return `<span class="pill" style="background:${bg};color:${getContrastColor(bg)}">${g}</span>`;
    }).join('');
    pillCache.set(key, html);
    return html;
}

/* ── State ── */
let activeGenres = new Set();
let currentType = 'all';
let searchQuery = '';

/* ── DOM refs ── */
const genreBox  = document.getElementById('genre-box');
const grid      = document.getElementById('grid');
const counter   = document.getElementById('counter');
const searchEl  = document.getElementById('search');

/* ── Build genre filter tags ── */
function init() {
    const uniqueGenres = [...new Set(allTitles.flatMap(t => t.c))].sort();
    const frag = document.createDocumentFragment();
    uniqueGenres.forEach(genre => {
        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.textContent = genre;
        tag.tabIndex = 0;
        tag.setAttribute('role', 'button');
        tag.setAttribute('aria-pressed', 'false');
        const bg = colorMap[genre] || '#334155';
        tag.style.backgroundColor = bg;
        tag.style.color = getContrastColor(bg);
        tag.addEventListener('click', () => toggleGenre(genre, tag));
        tag.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleGenre(genre, tag); }
        });
        frag.appendChild(tag);
    });
    genreBox.appendChild(frag);

    /* Type toggle buttons */
    document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => setType(btn.dataset.type, btn));
    });

    /* Clear button */
    document.getElementById('clear-filters').addEventListener('click', clearAll);

    /* Search */
    searchEl.addEventListener('input', () => {
        searchQuery = searchEl.value.trim().toLowerCase();
        render();
    });

    render();
}

function setType(type, btn) {
    currentType = type;
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
}

function toggleGenre(genre, el) {
    if (activeGenres.has(genre)) {
        activeGenres.delete(genre);
        el.classList.remove('active');
        el.setAttribute('aria-pressed', 'false');
    } else {
        activeGenres.add(genre);
        el.classList.add('active');
        el.setAttribute('aria-pressed', 'true');
    }
    render();
}

function clearAll() {
    activeGenres.clear();
    currentType = 'all';
    searchQuery = '';
    searchEl.value = '';
    document.querySelectorAll('.tag').forEach(t => {
        t.classList.remove('active');
        t.setAttribute('aria-pressed', 'false');
    });
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('.toggle-btn[data-type="all"]').classList.add('active');
    render();
}

function render() {
    const q = searchQuery;
    const filtered = allTitles.filter(item => {
        if (currentType !== 'all' && item.type !== currentType) return false;
        if (activeGenres.size > 0 && ![...activeGenres].every(g => item.c.includes(g))) return false;
        if (q && !item.t.toLowerCase().includes(q) && !item.d.toLowerCase().includes(q)) return false;
        return true;
    });

    const choiceLabel = 'Choice of Games';
    const hostedLabel = 'Hosted Games';

    counter.innerHTML = `Showing <b>${filtered.length}</b> of ${allTitles.length} titles`;

    const frag = document.createDocumentFragment();

    if (filtered.length === 0) {
        const msg = document.createElement('div');
        msg.className = 'no-results';
        msg.textContent = 'No titles match your filters. Try clearing some!';
        frag.appendChild(msg);
    } else {
        filtered.forEach(item => {
            const link = document.createElement('a');
            link.className = 'card-link';
            link.href = makeURL(item);
            link.target = '_blank';
            link.rel = 'noopener noreferrer';

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-type">${item.type === 'choice' ? choiceLabel : hostedLabel}</div>
                <h3>${item.t}</h3>
                <p>${item.d}</p>
                <div class="card-tags">${getPillsHTML(item.c)}</div>`;

            link.appendChild(card);
            frag.appendChild(link);
        });
    }

    grid.replaceChildren(frag);
}

init();
</script>
</body>
</html>
